/* ── App ───────────────────────────────────────────────── */
function App(){
  const[pi,setPi]=useState(()=>{try{return JSON.parse(localStorage.getItem("ukt_pi")||"0");}catch{return 0;}});
  const[wi,setWi]=useState(()=>{try{return JSON.parse(localStorage.getItem("ukt_wi")||"0");}catch{return 0;}});
  const[si,setSi]=useState(()=>{try{return JSON.parse(localStorage.getItem("ukt_si")||"0");}catch{return 0;}});
  const[editing,setEditing]=useState(false);
  const[view,setView]=useState(()=>{try{return localStorage.getItem("ukt_view")||"week";}catch{return "week";}});
  const[customEx,setCustomEx]=useState(()=>{try{return JSON.parse(localStorage.getItem("ukt_customex")||"{}");}catch{return{};}});
  const[customSes,setCustomSes]=useState(()=>{try{return JSON.parse(localStorage.getItem("ukt_customses")||"{}");}catch{return{};}});
  const[prs,setPrs]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("ukt_prs")||"{}");}catch{return{};}
  });
  const[comments,setComments]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("ukt_comments")||"{}");}catch{return{};}
  });
  // completed: Set of keys "pi-wi-si" that have been finished
  const[completed,setCompleted]=useState(()=>{
    try{return new Set(JSON.parse(localStorage.getItem("ukt_completed")||"[]"));}catch{return new Set();}
  });
  const[showDone,setShowDone]=useState(false);
  const[newBlockMode,setNewBlockMode]=useState(null);
  const[carryHint,setCarryHint]=useState(null);
  const[liveData,setLiveData]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("ukt_live")||"{}");}catch{return{};}
  });

  useEffect(()=>{try{localStorage.setItem("ukt_prs",JSON.stringify(prs));}catch{}},[prs]);
  useEffect(()=>{try{localStorage.setItem("ukt_live",JSON.stringify(liveData));}catch{}},[liveData]);
  useEffect(()=>{try{localStorage.setItem("ukt_comments",JSON.stringify(comments));}catch{}},[comments]);
  useEffect(()=>{try{localStorage.setItem("ukt_completed",JSON.stringify([...completed]));}catch{}},[completed]);
  useEffect(()=>{try{localStorage.setItem("ukt_customex",JSON.stringify(customEx));}catch{}},[customEx]);
  useEffect(()=>{try{localStorage.setItem("ukt_customses",JSON.stringify(customSes));}catch{}},[customSes]);
  useEffect(()=>{try{localStorage.setItem("ukt_pi",JSON.stringify(pi));localStorage.setItem("ukt_wi",JSON.stringify(wi));localStorage.setItem("ukt_si",JSON.stringify(si));}catch{}},[pi,wi,si]);
  useEffect(()=>{try{localStorage.setItem("ukt_view",view);}catch{}},[view]);

  // Auto-advance: when a training is marked complete, jump to next unfinished session
  useEffect(()=>{
    const PHASE_WEEKS=[5,6,5,3];
    const SESSIONS_PER_WEEK=3;
    // find next incomplete session starting from current position
    const find=()=>{
      for(let p=pi;p<PHASE_WEEKS.length;p++){
        const startW=p===pi?wi:0;
        for(let w=startW;w<PHASE_WEEKS[p];w++){
          const startS=p===pi&&w===wi?si:0;
          for(let s=startS;s<SESSIONS_PER_WEEK;s++){
            if(!completed.has(`${p}-${w}-${s}`))return{p,w,s};
          }
        }
      }
      return null;
    };
    const next=find();
    if(next&&(next.p!==pi||next.w!==wi||next.s!==si)){
      setPi(next.p);setWi(next.w);setSi(next.s);
    }
  },[completed]);

  // Auto-show summary when all 36 sessions done
  const totalSessions=57;
  const allProgramDone=[...completed].filter(k=>{
    const[pi,wi,si]=k.split('-').map(Number);
    return si<=2&&((pi===0&&wi<=4)||(pi===1&&wi<=5)||(pi===2&&wi<=4)||(pi===3&&wi<=2));
  }).length===totalSessions;

  const wn=[0,5,11,16][pi]+wi+1;
  const key=`${pi}-${wi}-${si}`;
  const prevCustomKey=wi>0?`${pi}-${wi-1}-${si}`:null;
  const prevCustomEx=prevCustomKey?customEx[prevCustomKey]:null;
  const builtEx=buildExercises(pi,wi)[si];
  const exercises=customEx[key]??
    (prevCustomEx
      ?prevCustomEx.map(px=>{
          const plan=builtEx.find(b=>b.name===px.name);
          return plan?{...px,sets:plan.sets,targetRpe:plan.targetRpe,note:plan.note}:{...px};
        })
      :builtEx);

  // Auto-carry + RPE-adjust weights from previous week
  const prevKey=wi>0?`${pi}-${wi-1}-${si}`:null;
  const prevLiveKgs=prevKey?liveData[prevKey]?.kgs:null;
  const prevLiveRpes=prevKey?liveData[prevKey]?.rpes:null;
  // Trigger carry if prev week has RPE entries and this week not yet started
  const autoCarried=!!(prevKey&&prevLiveRpes&&!(liveData[key]?.rpes)&&!(liveData[key]?.kgs));
  // +2.5kg per RPE point below target, -2.5kg above; tolerance 1pt
  const rpeAdjKg=(kg,rpe,tgt)=>{
    if(!rpe||!tgt||kg==null)return kg;
    const diff=tgt-rpe;
    if(Math.abs(diff)<1)return kg;
    return Math.max(0,Math.round(((Number(kg)||0)+diff*2.5)/2.5)*2.5);
  };
  // Get base kg for a set from prev week: manual entry if exists, else plan weight
  const prevPlanExList=prevKey?buildExercises(pi,wi-1)[si]:null;
  const getPrevBaseKg=(exIdx,si2)=>{
    const manual=(prevLiveKgs||[])[exIdx];
    if(manual!==undefined){
      const a=Array.isArray(manual)?manual:[manual];
      return a[si2]??a[0];
    }
    // no manual kg — use plan weight from prev week (same exercise name)
    const nm=exercises[exIdx]?.name;
    const pl=prevPlanExList?.find(x=>x.name===nm);
    return pl?.sets[si2]?.kg??pl?.sets[0]?.kg??null;
  };
  const getInitKgs=(exIdx,ex)=>{
    const live=(liveData[key]?.kgs||[])[exIdx];
    if(live!==undefined){
      // live is stored as the full per-set array — ensure flat array of numbers
      return Array.isArray(live)?live:ex.sets.map(()=>live);
    }
    if(!prevKey)return ex.sets.map(()=>null); // first week: no prior data, user must set weights
    const prpes=(prevLiveRpes||[])[exIdx];
    const prpesArr=Array.isArray(prpes)?prpes:ex.sets.map(()=>prpes);
    return ex.sets.map((s,si2)=>{
      const base=getPrevBaseKg(exIdx,si2); // prev manual only — null if no prev data
      if(base==null)return null; // no prior data → user must set weight
      const rpe=prpesArr[si2];
      return rpeAdjKg(base,rpe,ex.targetRpe)??base;
    });
  };
  const getCarryDelta=()=>{
    if(!autoCarried||!exercises.length)return 0;
    let sum=0,n=0;
    exercises.forEach((ex,ei)=>{
      const prpes=(prevLiveRpes||[])[ei];
      if(!prpes)return;
      const prpesArr=Array.isArray(prpes)?prpes:[prpes];
      ex.sets.forEach((s,si2)=>{
        const rpe=prpesArr[si2];if(!rpe||rpe===0)return;
        const base=getPrevBaseKg(ei,si2)??s.kg;
        const adj=rpeAdjKg(base,rpe,ex.targetRpe);
        if(adj!=null&&base!=null&&adj!==base){sum+=adj-base;n++;}
      });
    });
    return n?Math.round(sum/n*10)/10:0;
  };
  const session=customSes[`${pi}-${si}`]??SESSION_DEFAULTS[si];
  const phase=PHASES[pi];
  const isDl=(pi===0&&wi===4)||(pi===1&&wi===6)||(pi===2&&wi===5)||(pi===3&&wi===7);
  const prCount=Object.keys(prs).length;

  const handleImport=()=>{
    try{setPrs(JSON.parse(localStorage.getItem("ukt_prs")||"{}"));}catch{}
    try{setComments(JSON.parse(localStorage.getItem("ukt_comments")||"{}"));}catch{}
    try{setCompleted(new Set(JSON.parse(localStorage.getItem("ukt_completed")||"[]")));}catch{}
    try{setLiveData(JSON.parse(localStorage.getItem("ukt_live")||"{}"));}catch{}
    // force full reload to pick up weekplan, weeklabels, user_exercises etc.
    setTimeout(()=>window.location.reload(),300);
  };

  const handlePR=(name,kg,reps,repsNum)=>{
    setPrs(prev=>{
      const existing=prev[name];
      const n=repsNum||parseInt(reps)||1;
      const orm=Math.round(kg*(1+n/30)*10)/10;
      const entry={kg,reps,repsNum:n,orm,date:today(),wn};
      if(!existing)return{...prev,[name]:{best:kg,bestReps:reps,bestOrm:orm,history:[entry]}};
      const newBest=kg>=existing.best;
      return{...prev,[name]:{
        best:newBest?kg:existing.best,
        bestReps:newBest?reps:existing.bestReps,
        bestOrm:newBest?orm:existing.bestOrm,
        history:[...existing.history,entry],
      }};
    });
  };

  const handleLiveUpdate=(sesKey,exIdx,field,val)=>{
    setLiveData(prev=>{
      const ses=prev[sesKey]||{};
      const arr=[...(ses[field]||[])];
      arr[exIdx]=val;
      return{...prev,[sesKey]:{...ses,[field]:arr}};
    });
  };

  useEffect(()=>{
    if(autoCarried){setCarryHint(wn-1);const t=setTimeout(()=>setCarryHint(null),3000);return()=>clearTimeout(t);}
    else setCarryHint(null);
  },[key]);

  const HEADER_H=108; // approx header height

  return(
    <div className="app-shell" style={{minHeight:"100vh",minHeight:"100dvh",background:T.bg,fontFamily:"'DM Sans',sans-serif",fontSize:16,color:T.ink,display:"flex",flexDirection:"row"}}>
      <MiniSidebar view={view} setView={setView} pi={pi} wi={wi} setPi={setPi} setWi={setWi} setSi={setSi} prs={prs} onDeletePr={name=>setPrs(p=>{const n={...p};delete n[name];return n;})}/>
      <div className="main-wrapper" style={{flex:1,minWidth:0,display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:T.surface,borderBottom:`1px solid ${T.hairline}`,
        position:"sticky",top:0,zIndex:100,
        paddingTop:"env(safe-area-inset-top,0px)"}}>
        <div className="header-inner" style={{maxWidth:"100%",margin:0}}>

          {/* Top row: title + phase info */}
          <div style={{padding:"10px 20px 0",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
            <div style={{fontSize:12,textTransform:"uppercase",letterSpacing:"0.14em",color:T.mid}}>
              ⛰ Ultratrail Kraft
            </div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:T.mid}}>
              Ph.{phase.label} · W{wn}{isDl?" · Deload":""} · {phase.sub}
            </div>
          </div>

          {/* Mini week strip */}
          {(()=>{
            const wkKey=getWeekKey();
            const wkPlan=(()=>{try{return JSON.parse(localStorage.getItem('ukt_weekplan')||'{}');}catch{return{};}})();
            const wkLabels=(()=>{try{return JSON.parse(localStorage.getItem('ukt_weeklabels')||JSON.stringify(LABEL_COLORS));}catch{return LABEL_COLORS;}})();
            const wkData=wkPlan[wkKey]||DAYS.map((_,i)=>[1,3,5].includes(i)?['Kraft']:[]);
            const today=new Date();
            const mon=new Date(wkKey);
            return(
              <div style={{display:"flex",gap:3,padding:"8px 20px 0",overflowX:"auto",
                WebkitOverflowScrolling:"touch"}}>
                {DAYS.map((day,di)=>{
                  const d=new Date(mon); d.setDate(mon.getDate()+di);
                  const isToday=d.toDateString()===today.toDateString();
                  const entries=wkData[di]||[];
                  return(
                    <div key={di} onClick={()=>setView("week")} style={{
                      flex:"0 0 auto",minWidth:38,cursor:"pointer",
                      padding:"5px 4px 6px",borderRadius:7,textAlign:"center",
                      background:isToday?T.ink:"transparent",
                      transition:"background 0.15s",
                    }}>
                      <div style={{fontSize:11,fontWeight:600,letterSpacing:"0.04em",
                        color:isToday?T.surface:T.mid,marginBottom:3,textTransform:"uppercase"}}>
                        {day}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:2,alignItems:"center"}}>
                        {entries.length===0
                          ?<div style={{width:6,height:6,borderRadius:"50%",
                              background:isToday?"rgba(255,255,255,0.3)":T.hairline}}/>
                          :entries.slice(0,2).map((e,ei)=>{
                            const lbl=wkLabels.find(l=>l.label===e)||{color:T.faint};
                            return(
                              <div key={ei} style={{
                                width:28,height:5,borderRadius:3,
                                background:lbl.color,
                              }}/>
                            );
                          })
                        }
                        {entries.length>2&&<div style={{fontSize:8,color:isToday?"rgba(255,255,255,0.7)":T.mid,lineHeight:1}}>+{entries.length-2}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {/* Phase tabs (only in train view) */}
          {view==="train"
            ?<div style={{display:"flex",gap:0,marginTop:6,borderBottom:`1px solid ${T.hairline}`,paddingLeft:20}}>
                {PHASES.map((p,i)=>(
                  <button key={i} onClick={()=>{setPi(i);setWi(0);setSi(0);}} style={{
                    padding:"7px 10px 9px",background:"none",border:"none",cursor:"pointer",
                    fontSize:13,fontWeight:pi===i?600:400,
                    color:pi===i?T.ink:T.mid,
                    borderBottom:pi===i?`2px solid ${T.ink}`:"2px solid transparent",
                    marginBottom:-1,transition:"color 0.15s",
                  }}>
                    <div>Ph.{p.label}</div>
                    <div style={{fontSize:11,color:pi===i?T.mid:"#bbb",marginTop:1}}>{p.dates}</div>
                  </button>
                ))}
              </div>
            :<div style={{height:8}}/>
          }
        </div>
      </div>

      {/* Content */}
      <div className="main-content" style={{maxWidth:"100%",margin:0,padding:"0 20px",
        paddingBottom:"calc(80px + env(safe-area-inset-bottom,0px))"}}>

        {/* ─── Train view ─── */}
        {view==="train"&&(
          <>
            {/* Week selector */}
            <div style={{paddingTop:16,paddingBottom:14,
              borderBottom:`1px solid ${T.hairline}`,
              display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:12,textTransform:"uppercase",letterSpacing:"0.1em",
                color:T.mid,minWidth:44}}>Woche</span>
              <div style={{display:"flex",gap:6}}>
                {Array.from({length:[5,6,5,3][pi]},(_,i)=>i).map(i=>{
                  const n=[0,5,12,18][pi]+i+1,active=wi===i,dl=(pi===0&&i===4)||(pi===1&&i===6)||(pi===2&&i===5)||(pi===3&&i===7);
                  // week is done if all 3 sessions are completed
                  const weekDone=[0,1,2].every(si=>completed.has(`${pi}-${i}-${si}`));
                  const weekPartial=[0,1,2].some(si=>completed.has(`${pi}-${i}-${si}`));
                  return(
                    <button key={i} onClick={()=>{setWi(i);setSi(0);}} style={{
                      width:44,height:36,borderRadius:6,position:"relative",
                      background:active?T.ink:weekDone?T.ink:"transparent",
                      border:`1px solid ${active||weekDone?T.ink:T.hairline}`,
                      color:active||weekDone?T.surface:T.mid,
                      fontSize:14,fontWeight:active||weekDone?600:400,
                      cursor:"pointer",transition:"all 0.12s",
                    }}>
                      {n}{dl&&<span style={{fontSize:11}}>D</span>}
                      {weekPartial&&!weekDone&&!active&&(
                        <span style={{position:"absolute",top:4,right:5,
                          display:"flex",gap:2}}>
                          {[0,1,2].map(si=>(
                            <span key={si} style={{
                              width:4,height:4,borderRadius:"50%",
                              background:completed.has(`${pi}-${i}-${si}`)?T.ink:T.hairline,
                              display:"inline-block",
                            }}/>
                          ))}
                        </span>
                      )}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Session selector */}
            <div style={{paddingTop:12,paddingBottom:14,
              borderBottom:`1px solid ${T.hairline}`,
              display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:12,textTransform:"uppercase",letterSpacing:"0.1em",
                color:T.mid,minWidth:44}}>Einheit</span>
              <div style={{display:"flex",gap:6}}>
                {SESSION_DEFAULTS.map((s,i)=>{
                  const active=si===i,custom=customSes[`${pi}-${i}`];
                  const sessDone=completed.has(`${pi}-${wi}-${i}`);
                  return(
                    <button key={i} onClick={()=>setSi(i)} style={{
                      padding:"7px 18px",borderRadius:6,
                      background:active?T.ink:sessDone?T.ink:"transparent",
                      border:`1px solid ${active||sessDone?T.ink:T.hairline}`,
                      color:active||sessDone?T.surface:T.mid,
                      fontSize:14,fontWeight:active||sessDone?600:400,
                      cursor:"pointer",transition:"all 0.12s",
                      display:"flex",alignItems:"center",gap:5,
                    }}>
                      {sessDone&&!active&&<span style={{fontSize:13}}>✓</span>}
                      {(custom?.day)||s.day}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Session header */}
            <div style={{paddingTop:18,paddingBottom:4,
              display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:22,fontWeight:500,letterSpacing:"-0.02em"}}>{session.title}</div>
                <div style={{fontSize:13,color:T.mid,marginTop:3}}>
                  {session.long||session.day} · {exercises.length} Übungen
                </div>
              </div>
              <button onClick={()=>setEditing(true)} style={{
                fontSize:13,color:T.mid,background:"none",
                border:`1px solid ${T.hairline}`,borderRadius:6,
                padding:"7px 14px",cursor:"pointer",flexShrink:0,marginTop:4,
              }}>Bearbeiten</button>
            </div>

            {/* Warm-up */}
            <div style={{margin:"12px 0 4px",padding:"10px 14px",
              background:T.accentBg,borderRadius:6,borderLeft:`2px solid ${T.hairline}`}}>
              <span style={{fontSize:11,textTransform:"uppercase",letterSpacing:"0.1em",
                color:T.mid,marginRight:8}}>Warm-up</span>
              <span style={{fontSize:13,color:T.mid}}>{WARMUPS[pi]}</span>
            </div>

            {/* Exercises */}
            {carryHint&&(
              <div style={{margin:"8px 0 4px",padding:"9px 14px",borderRadius:8,
                background:"#e8f4e8",border:"1px solid #a8d4a8",
                fontSize:13,color:"#2d6a2d",display:"flex",alignItems:"center",gap:8}}>
                <span>&#8593;</span>
                <span>{(()=>{const d=getCarryDelta();return d>0?`Wo ${carryHint} übernommen · Ø +${d} kg (RPE zu leicht)`:d<0?`Wo ${carryHint} übernommen · Ø ${d} kg (RPE zu schwer)`:`Wo ${carryHint} übernommen`;})()} </span>
              </div>
            )}
            <div style={{marginTop:4}}>
              {exercises.map((ex,i)=>(
                <ExRow key={`${key}-${i}`} ex={ex} editMode={false}
                  onUpdate={()=>{}} onDelete={()=>{}}
                  onPR={handlePR}
                  commentKey={`${key}-${i}`}
                  comments={comments}
                  onComment={(k,v)=>setComments(p=>({...p,[k]:v}))}
                  savedKgs={getInitKgs(i,ex)}
                  savedRpes={(liveData[key]?.rpes||[])[i]}
                  onLiveKgs={v=>handleLiveUpdate(key,i,'kgs',v)}
                  onLiveRpes={v=>handleLiveUpdate(key,i,'rpes',v)}
                />
              ))}
            </div>


            {/* RPE legend */}
            <div style={{marginTop:24,paddingTop:16,borderTop:`1px solid ${T.hairline}`}}>
              <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:"0.1em",
                color:T.mid,marginBottom:10}}>RPE Legende</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[[1,"Minimal"],[3,"Leicht"],[5,"Moderat"],[6,"Kontrolliert"],[7,"Fordernd"],[8,"Schwer"],[9,"Sehr schwer"],[10,"Max"]].map(([v,l])=>(
                  <div key={v} style={{display:"flex",alignItems:"center",gap:5}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:RPE_C[v],border:`1px solid ${T.hairline}`}}/>
                    <span style={{fontSize:13,color:T.mid}}>{v} {l}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Finish session button */}
            {(()=>{
              const isDone=completed.has(key);
              return isDone?(
                <div style={{marginTop:24,padding:"18px 20px",
                  background:"#111110",borderRadius:12,
                  display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:22}}>✓</span>
                    <div>
                      <div style={{fontSize:12,fontWeight:600,color:"#fff"}}>Training abgeschlossen</div>
                      <div style={{fontSize:13,color:"#888",marginTop:1}}>{session.title} · W{wn}</div>
                    </div>
                  </div>
                  <button onClick={()=>{
                    setCompleted(prev=>{const s=new Set(prev);s.delete(key);return s;});
                    setShowDone(false);
                  }} style={{
                    fontSize:13,color:"#888",background:"none",
                    border:"1px solid #444",borderRadius:6,
                    padding:"6px 12px",cursor:"pointer",flexShrink:0,
                  }}>Rückgängig</button>
                </div>
              ):(
                <button onClick={()=>{
                  setCompleted(prev=>new Set([...prev,key]));
                  setShowDone(true);
                  setTimeout(()=>setShowDone(false),3000);
                }} style={{
                  marginTop:24,width:"100%",padding:"16px",
                  background:T.ink,border:"none",borderRadius:12,
                  cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:10,
                }}>
                  <span style={{fontSize:19,lineHeight:1}}>✓</span>
                  <span style={{fontSize:16,fontWeight:600,color:T.surface,letterSpacing:"-0.01em"}}>
                    Training abschliessen
                  </span>
                </button>
              );
            })()}

            {/* Auto-complete banner */}
            {allProgramDone&&view==="train"&&(
              <div style={{margin:"20px 0",padding:"16px",
                background:T.ink,borderRadius:12,
                display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:T.surface}}>🏆 Programm abgeschlossen!</div>
                  <div style={{fontSize:13,color:"#aaa",marginTop:2}}>Alle 36 Einheiten erledigt.</div>
                </div>
                <button onClick={()=>setView("summary")} style={{
                  fontSize:13,fontWeight:600,color:T.ink,
                  background:T.surface,border:"none",borderRadius:6,
                  padding:"7px 12px",cursor:"pointer",flexShrink:0,
                }}>Report →</button>
              </div>
            )}

            {/* Toast */}
            {showDone&&(
              <div style={{
                position:"fixed",bottom:"calc(80px + env(safe-area-inset-bottom,0px) + 16px)",
                left:"50%",transform:"translateX(-50%)",
                background:T.ink,color:T.surface,
                padding:"12px 24px",borderRadius:40,
                fontSize:14,fontWeight:500,zIndex:400,
                boxShadow:"0 4px 20px rgba(0,0,0,0.18)",
                whiteSpace:"nowrap",pointerEvents:"none",
              }}>✓ Gespeichert</div>
            )}
          </>
        )}

        {view==="week"&&<WeekPlanner/>}
        {view==="prs"&&<PRView prs={prs} onClear={()=>setPrs({})}/>}
        {view==="library"&&<LibraryView/>}
        {view==="data"&&<DataView prs={prs} comments={comments} completed={completed} onImport={handleImport}/>}
        {view==="summary"&&!newBlockMode&&(
          <SummaryView prs={prs} completed={completed}
            onNewBlock={mode=>{setNewBlockMode(mode);}}/>
        )}
        {view==="summary"&&newBlockMode&&(
          <NewBlockView mode={newBlockMode} prs={prs}
            onBack={()=>setNewBlockMode(null)}
            onStart={(cfg)=>{
              // Save block config and switch to train view
              try{
                const blocks=JSON.parse(localStorage.getItem("ukt_custom_blocks")||"[]");
                blocks.push({...cfg, createdAt:new Date().toISOString()});
                localStorage.setItem("ukt_custom_blocks",JSON.stringify(blocks));
              }catch{}
              setNewBlockMode(null);
              setView("train");
              alert("Block gespeichert! Du kannst jetzt mit dem Training beginnen.");
            }}/>
        )}
      </div>

      {/* Bottom Nav */}
      </div>
      <NavBar view={view} setView={setView} prCount={prCount}/>

      {/* Edit panel */}
      {editing&&(
        <EditPanel session={session} exercises={exercises}
          prevExercises={wi>0?(customEx[`${pi}-${wi-1}-${si}`]??buildExercises(pi,wi-1)[si]):null}
          prevWeekNum={wi>0?pi*4+(wi-1)+1:null}
          onUpdateEx={(exs,propagate)=>{
            const totalWks=[5,6,5,3][pi];
            setCustomEx(prev=>{
              const next={...prev,[key]:exs};
              if(propagate){
                for(let w=wi+1;w<totalWks;w++){
                  next[`${pi}-${w}-${si}`]=exs.map(ex=>({...ex}));
                }
              }
              return next;
            });
          }}
          phaseWeekCount={[5,6,5,3][pi]}
          currentWi={wi}
          onUpdateSession={s=>setCustomSes(c=>({...c,[`${pi}-${si}`]:s}))}
          onClose={()=>setEditing(false)}/>
      )}
    </div>
  );
}

function PasswordGate({children}){
  const PW="kraft2025";
  const[unlocked,setUnlocked]=useState(()=>sessionStorage.getItem("ukt_auth")==="1");
  const[input,setInput]=useState("");
  const[shake,setShake]=useState(false);
  const attempt=()=>{
    if(input===PW){sessionStorage.setItem("ukt_auth","1");setUnlocked(true);}
    else{setShake(true);setInput("");setTimeout(()=>setShake(false),600);}
  };
  if(unlocked)return children;
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:"#f5f4f0",fontFamily:"'DM Sans',sans-serif"}}>
      <div style={{background:"#fff",borderRadius:16,padding:"40px 32px",width:320,
        boxShadow:"0 4px 24px rgba(0,0,0,0.08)",textAlign:"center"}}>
        <div style={{fontSize:28,marginBottom:8}}>⛰</div>
        <div style={{fontSize:18,fontWeight:600,marginBottom:4}}>Ultratrail Kraft</div>
        <div style={{fontSize:14,color:"#888",marginBottom:24}}>Bitte Passwort eingeben</div>
        <input
          type="password"
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&attempt()}
          placeholder="Passwort"
          autoFocus
          style={{
            width:"100%",padding:"10px 14px",borderRadius:8,fontSize:15,
            border:"1px solid "+(shake?"#e05":"#ddd"),
            outline:"none",boxSizing:"border-box",marginBottom:12,
            animation:shake?"shake 0.4s":"none",
            transition:"border-color 0.2s",
          }}
        />
        <button onClick={attempt} style={{
          width:"100%",padding:"11px 0",borderRadius:8,border:"none",
          background:"#1a1a18",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",
        }}>Weiter</button>
        <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}`}</style>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PasswordGate><App/></PasswordGate>);

<script>
